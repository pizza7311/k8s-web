apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-web
  template:
    metadata:
      labels:
        app: test-web
    spec:
      containers:
        - name: web-app
          image: test-web
          ports:
            - containerPort: 3000
          env:
            - name: INTERNAL_BACKEND_URL
              value: http://test-backend-service
          livenessProbe:
            httpGet:
              path: /api/health-check
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health-check
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
